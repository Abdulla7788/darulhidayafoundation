      tailwind.config = {

    <style>
      body { background-color: #ffffff; color: #0f172a; font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.01em; }
      .glass { background-color: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
      .glass-dark { background-color: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
      .section-padding { padding: 8rem 2rem; }
      @media (min-width: 1024px) { .section-padding { padding-left: 6rem; padding-right: 6rem; } }
      .btn-gradient { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.1); }
      .btn-gradient:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); border-color: #fccb05; }
      .btn-outline { border: 1.5px solid #d9ad04; color: #725a02; transition: all 0.4s; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
      .btn-outline:hover { background-color: #d9ad04; color: white; transform: scale(1.02); }
      ::-webkit-scrollbar { width: 10px; }
      ::-webkit-scrollbar-track { background: #f8fafc; }
      ::-webkit-scrollbar-thumb { background: linear-gradient(#0f172a, #15803d); border-radius: 9999px; }
      h1, h2, h3, h4, h5, h6 { font-family: 'Playfair Display', serif; font-weight: 800; letter-spacing: -0.02em; }
